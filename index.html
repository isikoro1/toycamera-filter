<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Analog Camera Lab</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>Analog Camera Lab</h1>
          <p>画像や映像をアナログカメラ風に変換</p>
        </div>
        <label class="file-button">
          <input id="fileInput" type="file" accept="image/*,video/*">
          <span>読み込む</span>
        </label>
      </header>

      <section class="workspace" aria-label="編集ワークスペース">
        <aside class="panel controls" aria-label="パターン">
          <h2>パターン</h2>
          <div class="preset-grid" id="presetGrid" role="group" aria-label="変換パターン">
            <button class="preset-card is-active" type="button" data-preset="heiseiCompact">
              <strong>平成コンパクト</strong>
              <span>少し眠い色、日付入り</span>
            </button>
            <button class="preset-card" type="button" data-preset="showaFilm">
              <strong>昭和フィルム</strong>
              <span>褪色、粒子、古い写真</span>
            </button>
            <button class="preset-card" type="button" data-preset="toyCamera">
              <strong>トイカメラ</strong>
              <span>強い周辺減光と光漏れ</span>
            </button>
            <button class="preset-card" type="button" data-preset="instant">
              <strong>ポラロイド</strong>
              <span>淡く柔らかい白っぽさ</span>
            </button>
            <button class="preset-card" type="button" data-preset="vhs">
              <strong>VHS</strong>
              <span>走査線と色ズレ</span>
            </button>
          </div>

          <div class="actions">
            <button id="downloadImage" type="button" disabled>画像保存</button>
            <button id="recordVideo" type="button" disabled>動画保存</button>
          </div>
          <p class="status" id="statusText" aria-live="polite"></p>
        </aside>

        <section class="preview-area" aria-label="プレビュー">
          <div class="stage">
            <canvas id="canvas" width="1280" height="720"></canvas>
            <div id="emptyState" class="empty-state">
              <strong>画像または動画を読み込んでください</strong>
              <span>JPG、PNG、WebP、MP4、MOV、WebMに対応</span>
            </div>
          </div>
          <div class="transport">
            <button id="playPause" type="button" disabled>再生</button>
            <input id="seek" type="range" min="0" max="1000" value="0" disabled>
            <span id="timeLabel">00:00 / 00:00</span>
          </div>
        </section>
      </section>
    </main>

    <video id="sourceVideo" playsinline crossorigin="anonymous"></video>
    <script src="./app.js"></script>
  </body>
</html>
